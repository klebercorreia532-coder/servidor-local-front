services:
  api:
    build:
      context: ../servidor-local
      dockerfile: Dockerfile
    container_name: servidor-local
    ports:
      - "8080:8080"

    networks:
      - marketplace-net

    environment:
      - PORT=8080
      - NODE_ENV=development

  web:
    build: 
      context: .
    container_name: servidor-local-front
    ports:
      - "3000:3000"
    networks:
      - marketplace-net
    depends_on:
      - api
    environment:
      - PORT=3000
      - NEXT_PUBLIC_DATA_API_URL=http://api:8080/graphql
      - NEXT_PUBLIC_IMAGES_API_URL=http://api:8080
 
networks:
  marketplace-net: 
    driver: bridge